project:
  title:        "4-Stage Library Entry and Collection System"
  description:  "An FSM-based automated entrance turnstile system that tracks library entry, security validation, and capacity counts."
  author:       "Raksha S S"
  language:     "Verilog"
  clock_hz:     10000000       
  tiles_x:      1
  tiles_y:      1
  top_module:   "tt_um_lib_sys"

documentation:
  inputs:
    - "card_scanned (ui_in[0])"
    - "sensor_tripped (ui_in[1])"
    - "clear_override (ui_in[2])"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
  outputs:
    - "gate_lock (uo_out[0])"
    - "security_alarm (uo_out[1])"
    - "capacity_count bit 0 (uo_out[2])"
    - "capacity_count bit 1 (uo_out[3])"
    - "capacity_count bit 2 (uo_out[4])"
    - "capacity_count bit 3 (uo_out[5])"
    - "capacity_count bit 4 (uo_out[6])"
    - "capacity_count bit 5 (uo_out[7])"
  bidirectional:
    - "none"
    - "none"
    - "current_state bit 0 (uio_out[2])"
    - "current_state bit 1 (uio_out[3])"
    - "none"
    - "none"
    - "none"
    - "none"
